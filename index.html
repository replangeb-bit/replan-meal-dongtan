<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리플랜 동탄 · 급식 신청 마감</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #f7f7f5;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card { width: 100%; max-width: 400px; text-align: center; }
  .campus {
    font-size: 13px;
    letter-spacing: 2px;
    color: #9ca3af;
    margin-bottom: 20px;
    font-weight: 600;
  }
  .icon { font-size: 40px; margin-bottom: 24px; }
  h1 {
    font-size: 21px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 16px;
    color: #1a1a1a;
  }
  p { font-size: 15px; line-height: 1.7; color: #6b7280; }
  .divider {
    width: 40px; height: 3px;
    background: #e5e5e3; border-radius: 2px;
    margin: 32px auto;
  }
  .contact { font-size: 14px; line-height: 1.7; color: #6b7280; }
  .contact strong { color: #1a1a1a; font-weight: 600; }
  .footer {
    margin-top: 40px; font-size: 12px;
    color: #a1a1aa; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="campus">MEAL · 리플랜 동탄센터</div>
    <div class="icon">🍱</div>
    <h1>2026 여름방학 급식 신청이<br>마감되었습니다</h1>
    <p>신규 신청 접수가 종료되었습니다.<br>이용해 주셔서 감사합니다.</p>
    <div class="divider"></div>
    <div class="contact">
      취소 · 환불 · 추가 신청 문의는<br>
      <strong>동탄센터 담당 조교 또는 데스크</strong>로 연락 주세요.
    </div>
    <div class="footer">리플랜 관리형 학습센터 · 동탄</div>
  </div>
</body>
</html>
